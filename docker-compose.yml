services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-quizify}
      - POSTGRES_USER=${POSTGRES_USER:-quizify}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-quizify_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quizify-network

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - quizify-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://quizify:quizify_password@postgres:5432/quizify}
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - quizify-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - quizify-network
    command: npm run dev -- --host

networks:
  quizify-network:
    driver: bridge

volumes:
  postgres_data:
